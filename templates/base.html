{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BEER JOURNAL{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v=20260713-detail">
</head>
<body>
  <header class="app-header">
    <a class="app-wordmark" href="{% url 'beer-list' %}">BEER JOURNAL</a>
  </header>
  <main class="app-content" id="app-content">
    {% block content %}{% endblock %}
  </main>
  <nav class="bottom-tab-bar" aria-label="主要导航">
    <a class="tab-item{% if request.resolver_match.url_name == 'beer-list' or request.resolver_match.url_name == 'beer-detail' %} is-active{% endif %}" href="{% url 'beer-list' %}"><span class="tab-icon">◒</span><span>我的啤酒</span></a>
    <a class="tab-item{% if request.resolver_match.url_name == 'tasting-list' or request.resolver_match.url_name == 'tasting-detail' %} is-active{% endif %}" href="{% url 'tasting-list' %}"><span class="tab-icon">◷</span><span>饮用记录</span></a>
    <a class="tab-item{% if request.resolver_match.url_name == 'personal-data' %} is-active{% endif %}" href="{% url 'personal-data' %}"><span class="tab-icon">◌</span><span>个人数据</span></a>
  </nav>
  <script defer src="{% static 'js/app.js' %}?v=20260713-detail"></script>
</body>
</html>
