{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f7f5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Beer">
  <title>{% block title %}BEER JOURNAL{% endblock %}</title>
  <link rel="manifest" href="{% url 'manifest' %}">
  <link rel="icon" href="{% static 'icons/beer-journal-favicon-v3.png' %}?v=20260714-f1" type="image/png">
  <link rel="apple-touch-icon" href="{% static 'icons/beer-journal-icon-192-v3.png' %}?v=20260714-f1">
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v=20260714-f23">
</head>
<body>
  <header class="app-header">
    <a class="app-wordmark" href="{% url 'beer-list' %}">BEER JOURNAL</a><button class="pwa-install-button" type="button" hidden data-pwa-install>安装 App</button>
  </header>
  <main class="app-content" id="app-content">
    {% block content %}{% endblock %}
  </main>
  <nav class="bottom-tab-bar" aria-label="主要导航">
    <a class="tab-item{% if request.resolver_match.url_name == 'beer-list' or request.resolver_match.url_name == 'beer-detail' %} is-active{% endif %}" href="{% url 'beer-list' %}" data-tab-navigation><span class="tab-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v16l-6-3-6 3z"></path></svg></span><span>我的啤酒</span></a>
    <a class="tab-item{% if request.resolver_match.url_name == 'tasting-list' or request.resolver_match.url_name == 'tasting-detail' %} is-active{% endif %}" href="{% url 'tasting-list' %}" data-tab-navigation><span class="tab-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 7v5l3 2"></path></svg></span><span>饮用记录</span></a>
    <a class="tab-item{% if request.resolver_match.url_name == 'personal-data' %} is-active{% endif %}" href="{% url 'personal-data' %}" data-tab-navigation><span class="tab-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V9M12 19V5M19 19v-7"></path></svg></span><span>个人数据</span></a>
  </nav>
  <script defer src="{% static 'js/app.js' %}?v=20260714-f23"></script>
</body>
</html>
