{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BEER JOURNAL{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="主导航">
      <a class="brand" href="{% url 'home' %}">BEER JOURNAL</a>
      <div class="nav-links">
        <a href="{% url 'home' %}">首页</a>
        <a href="{% url 'beer-list' %}">我的啤酒</a>
        <a class="button button-small" href="{% url 'beer-add' %}">添加啤酒</a>
      </div>
    </nav>
  </header>
  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
