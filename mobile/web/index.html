<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f5">
  <meta name="description" content="Beer Journal 本地啤酒收藏">
  <link rel="icon" href="assets/beer-journal-icon.png" type="image/png">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="stylesheet" href="assets/local.css">
  <title>Beer Journal</title>
</head>
<body>
  <div id="app-shell" class="local-app" data-app-shell>
    <header class="local-header" data-app-header>
      <div class="local-brand">
        <img id="app-logo" class="logo-image" src="assets/beer-journal-icon.png" width="42" height="42" alt="Beer Journal">
        <div><small>BEER JOURNAL</small><strong>本地收藏</strong></div>
      </div>
    </header>
    <main id="route-content" class="local-route-content" aria-live="polite"></main>
    <nav id="bottom-nav" class="local-bottom-nav" data-app-bottom-nav aria-label="主要导航">
      <a class="local-tab" href="#/beers" data-route="/beers"><span class="local-tab-icon" aria-hidden="true">🍺</span><span>我的啤酒</span></a>
      <a class="local-tab" href="#/tastings" data-route="/tastings"><span class="local-tab-icon" aria-hidden="true">📝</span><span>饮用记录</span></a>
      <a class="local-tab" href="#/profile" data-route="/profile"><span class="local-tab-icon" aria-hidden="true">◉</span><span>个人数据</span></a>
    </nav>
  </div>
  <noscript>Beer Journal 需要启用 JavaScript 才能运行。</noscript>
  <div id="overlay-root" class="overlay-root filter-overlay-root" data-filter-root aria-live="polite"></div>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
