name: ${COMPOSE_PROJECT_NAME:-beer-journal}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../postgres:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    cpus: "0.75"
    mem_limit: 768m
    pids_limit: 128

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: beer-journal-web:${APP_IMAGE_TAG:-production}
    restart: unless-stopped
    command: >-
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-1}
      --timeout 60
      --access-logfile -
      --error-logfile -
    environment:
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_DEBUG: ${DEBUG}
      DJANGO_ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DJANGO_STATIC_ROOT: ${DJANGO_STATIC_ROOT}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DJANGO_HSTS_SECONDS: ${DJANGO_HSTS_SECONDS}
      DJANGO_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_HSTS_INCLUDE_SUBDOMAINS}
      DJANGO_HSTS_PRELOAD: ${DJANGO_HSTS_PRELOAD}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ../media:/app/media
      - ../static:/app/static
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)\""]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 30s
    cpus: "0.75"
    mem_limit: 512m
    pids_limit: 128

  nginx:
    image: ${NGINX_IMAGE:-nginx:stable-alpine}
    restart: unless-stopped
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-12m}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ../static:/var/www/static:ro
      - ./deploy/nginx/${NGINX_CONFIG_TEMPLATE:-beer-journal.http.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
    cpus: "0.25"
    mem_limit: 128m
    pids_limit: 64

networks:
  backend:
    internal: true

volumes:
  letsencrypt_data:
  certbot_webroot:
